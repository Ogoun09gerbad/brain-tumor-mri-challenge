name: ML Competition Evaluation

on:
  pull_request:
    branches: [main]
    paths: ['submissions/*.csv']

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas scikit-learn

      - name: Run Evaluation
        run: |
          # Trouve le premier CSV dans submissions/
          SUB_FILE=$(ls submissions/*.csv | head -n 1)
          # Lance le script avec l'argument --submission
          python evaluation/evaluate.py --submission "$SUB_FILE"

      - name: Update Leaderboard
        run: python leaderboard/update_leaderboard.py

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # Ajout des fichiers générés
          git add leaderboard/leaderboard.csv evaluation/results/*.json
          
          # On vérifie s'il y a des changements avant de commit
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update leaderboard [skip ci]"
            # On force le push du HEAD actuel vers la branche main
            git push origin HEAD:main
          fi
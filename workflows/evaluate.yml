name: ML Competition Evaluation

on:
  pull_request:
    paths:
      - 'submissions/**'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Generate Truth Labels
        run: python evaluation/setup_hidden_labels.py

      - name: Decrypt Submission
        # Cette étape suppose que vous avez stocké votre clé privée dans les secrets GitHub
        # Si vous n'utilisez pas d'encryption pour le moment, vous pouvez commenter cette partie
        run: |
          # python evaluation/decrypt.py --input submissions/baseline.enc --key ${{ secrets.PRIVATE_KEY }}
          echo "Déchiffrement effectué (simulé)"

      - name: Run Evaluation
        run: python evaluation/evaluate.py

      - name: Update Leaderboard
        run: python leaderboard/update_leaderboard.py

      - name: Commit and Push Results
        # Permet de mettre à jour automatiquement le fichier leaderboard.csv sur le dépôt
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add leaderboard/leaderboard.csv evaluation/results/*.json
          git commit -m "Update leaderboard with new submission" || echo "No changes to commit"
          git push